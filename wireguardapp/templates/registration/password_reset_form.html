{% extends "wireguardapp/base.html" %}

{% block title %}Reset hesla{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow-sm">
            <div class="card-body">

                <h4 class="mb-3 text-center">Zapomenuté heslo</h4>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        {{ form.email }}
                    </div>

                    <button class="btn btn-primary w-100">
                        Odeslat reset odkaz
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
