{% extends "wireguardapp/base.html" %}

{% block title %}WG{% endblock %}

{% block content %}

<div class="card shadow-sm mx-auto" style="max-width: 400px;">
    <div class="card-body">
        <h4 class="text-center mb-3">Set New Password</h4>

        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label>New password</label>
                {{ form.new_password1 }}
            </div>

            <div class="mb-3">
                <label>Confirm password</label>
                {{ form.new_password2 }}
            </div>

            <button type="submit" class="btn btn-success w-100">
                Reset Password
            </button>
        </form>
    </div>
</div>

{% endblock %}
