{% extends "wireguardapp/base.html" %}

{% block title %}WG{% endblock %}

{% block content %}

<form method="post" action="{% url 'newinterface' %}">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Save</button>
</form>

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}


{% endblock %}
